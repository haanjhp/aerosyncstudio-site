<h1>RosterSync</h1>

<p>
RosterSync는 항공사 승무원을 위한 스케줄 관리 및 공유 앱입니다.
자동으로 로스터를 가져와 캘린더에 표시하고,
동료 승무원과 스케줄을 비교할 수 있습니다.
</p>

<h2>Features</h2>
<ul>
    <li>Automatic roster parsing</li>
    <li>Calendar view</li>
    <li>Crew schedule comparison</li>

</ul>
